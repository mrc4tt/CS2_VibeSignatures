name: Promote Release After Output Merge
run-name: Promote output PR #${{ github.event.pull_request.number }}

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

jobs:
  resolve:
    if: >
      (github.repository == 'HLND2T/CS2_VibeSignatures' || github.repository == 'hzqst/CS2_VibeSignatures') &&
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'gamesymbols/')
    runs-on: ubuntu-latest
    outputs:
      gamever: ${{ steps.identity.outputs.gamever }}
    steps:
      - name: Resolve promotion concurrency identity
        id: identity
        shell: pwsh
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if ($env:PR_HEAD_REF -notmatch '^gamesymbols/(?<gamever>[0-9]{4,10}[a-z]?)/build-[0-9]+-[0-9]+$') {
            throw "Invalid generated-output branch."
          }
          "gamever=$($Matches.gamever)" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

  cleanup-unmerged:
    needs: resolve
    if: >
      github.event.pull_request.merged == false &&
      (github.repository == 'HLND2T/CS2_VibeSignatures' || github.repository == 'hzqst/CS2_VibeSignatures') &&
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'gamesymbols/')
    environment: win64
    runs-on: [self-hosted, windows, x64]
    concurrency:
      group: release-promotion-${{ github.repository }}-${{ needs.resolve.outputs.gamever }}
      cancel-in-progress: false
    env:
      PERSISTED_WORKSPACE: ${{ secrets.PERSISTED_WORKSPACE }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Remove only indexed pending state
        shell: pwsh
        run: |
          $index = Join-Path $env:PERSISTED_WORKSPACE "release-staging\pr-index\${{ github.event.pull_request.number }}.json"
          if (Test-Path -LiteralPath $index) {
            uv run release_workflow.py cleanup-unmerged `
              --staging-root "$env:PERSISTED_WORKSPACE\release-staging" `
              --pr-number "${{ github.event.pull_request.number }}" `
              --event-head-sha "${{ github.event.pull_request.head.sha }}"
          } else {
            Write-Host "No indexed pending state exists for this unmerged PR."
          }

  promote:
    needs: resolve
    if: >
      github.event.pull_request.merged == true &&
      (github.repository == 'HLND2T/CS2_VibeSignatures' || github.repository == 'hzqst/CS2_VibeSignatures') &&
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.base.ref == github.event.repository.default_branch &&
      startsWith(github.event.pull_request.head.ref, 'gamesymbols/')
    environment: win64
    runs-on: [self-hosted, windows, x64]
    concurrency:
      group: release-promotion-${{ github.repository }}-${{ needs.resolve.outputs.gamever }}
      cancel-in-progress: false
    env:
      PERSISTED_WORKSPACE: ${{ secrets.PERSISTED_WORKSPACE }}
      OUTPUT_MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
    steps:
      - name: Checkout exact accepted output merge
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
          submodules: true

      - name: Checkout trusted promotion tooling from merge base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: .release-tools
          fetch-depth: 1

      - name: Verify merge, PR index, manifests, staged bin, and output hashes
        id: verify
        shell: pwsh
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          uv run .release-tools/release_workflow.py verify-promotion `
            --repo-root "${{ github.workspace }}" `
            --staging-root "$env:PERSISTED_WORKSPACE\release-staging" `
            --repository "${{ github.repository }}" `
            --head-repository "$env:PR_HEAD_REPOSITORY" `
            --author "$env:PR_AUTHOR" --branch "$env:PR_HEAD_REF" `
            --base-branch "$env:PR_BASE_REF" `
            --default-branch "${{ github.event.repository.default_branch }}" `
            --pr-number "${{ github.event.pull_request.number }}" `
            --event-head-sha "$env:PR_HEAD_SHA" `
            --merge-sha "$env:OUTPUT_MERGE_SHA" --github-output "$env:GITHUB_OUTPUT"

      - name: Reconstruct release workspace from accepted commit and staged bin
        shell: pwsh
        run: |
          uv run .release-tools/release_workflow.py reconstruct `
            --repo-root "${{ github.workspace }}" `
            --stage-dir "${{ steps.verify.outputs.stage_dir }}" `
            --gamever "${{ steps.verify.outputs.gamever }}"

      - name: Create release archives
        shell: pwsh
        run: |
          $gamever = "${{ steps.verify.outputs.gamever }}"
          $manifest = Get-Content -Raw "release-manifests\$gamever.json" | ConvertFrom-Json
          $configPath = "configs\$gamever.yaml"
          $configBackup = Join-Path $env:RUNNER_TEMP "current-config-$gamever.yaml"
          $configHadBackup = Test-Path -LiteralPath $configPath -PathType Leaf
          if ($configHadBackup) { Copy-Item -LiteralPath $configPath -Destination $configBackup -Force }
          $sourceSha = [string]$manifest.source_sha
          $expectedConfigHash = [string]$manifest.analysis_config_sha256
          if ([string]::IsNullOrWhiteSpace($expectedConfigHash)) {
            throw "Release manifest $gamever lacks analysis_config_sha256; refusing archive promotion."
          }
          try {
            $extractScript = @'
            import pathlib, subprocess, sys
            pathlib.Path(sys.argv[2]).write_bytes(subprocess.check_output(["git", "show", f"{sys.argv[1]}:configs/{sys.argv[3]}.yaml"]))
            '@
            $extractScript | uv run python - "$sourceSha" "$configPath" "$gamever"
            if ($LASTEXITCODE -ne 0) { throw "Failed to extract source analysis config from $sourceSha." }
            $actualConfigHash = (Get-FileHash -LiteralPath $configPath -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actualConfigHash -ne $expectedConfigHash.ToLowerInvariant()) {
              throw "Source analysis config hash mismatch: expected $expectedConfigHash, actual $actualConfigHash"
            }
            $gamedataArgs = @(
              "a", "gamedata-$gamever.7z", "configs\$gamever.yaml", "bin\$gamever", "gamesymbols/$gamever.yaml", "dist", "hl2sdk_cs2", "-r",
              "-x!*.dll", "-x!*.so", "-x!*.i64", "-x!*.id0", "-x!*.id1", "-x!*.id2", "-x!*.nam", "-x!*.til",
              "-x!.git", "-x!.git-blame-ignore-revs", "-x!.gitmodules", "-xr!__pycache__", "-xr!gamedata.py"
            )
            & 7z @gamedataArgs
            if ($LASTEXITCODE -ne 0) { throw "Failed to create gamedata archive." }
          } finally {
            if ($configHadBackup) { Move-Item -LiteralPath $configBackup -Destination $configPath -Force }
            elseif (Test-Path -LiteralPath $configPath) { Remove-Item -LiteralPath $configPath -Force }
          }
          $gamebinArgs = @("a", "gamebin-$gamever.7z", "bin\$gamever", "-r", "-i!*.dll", "-i!*.so", "-x!*.yaml", "-xr!.venv")
          & 7z @gamebinArgs
          if ($LASTEXITCODE -ne 0) { throw "Failed to create gamebin archive." }

      - name: Promote verified bin transactionally
        shell: pwsh
        run: |
          uv run .release-tools/release_workflow.py promote-bin `
            --persisted-root "$env:PERSISTED_WORKSPACE" `
            --stage-dir "${{ steps.verify.outputs.stage_dir }}" `
            --gamever "${{ steps.verify.outputs.gamever }}" `
            --build-id "${{ steps.verify.outputs.build_id }}"

      - name: Apply immutable tag rules
        id: tag
        shell: pwsh
        run: |
          $gamever = "${{ steps.verify.outputs.gamever }}"
          $mode = "${{ steps.verify.outputs.mode }}"
          git fetch origin --tags --force
          $remote = git ls-remote --tags origin "refs/tags/$gamever"
          if ($LASTEXITCODE -ne 0) { throw "Failed to query tag $gamever." }
          if ($mode -eq "new") {
            if ([string]::IsNullOrWhiteSpace($remote)) {
              git tag "$gamever" "$env:OUTPUT_MERGE_SHA"
              git push origin "refs/tags/$gamever"
              if ($LASTEXITCODE -ne 0) { throw "Failed to create release tag $gamever." }
              $tagSha = $env:OUTPUT_MERGE_SHA
            } else {
              $tagSha = ($remote -split "\s+")[0]
              if ($tagSha -ne $env:OUTPUT_MERGE_SHA) { throw "Existing new-version tag points elsewhere." }
            }
          } else {
            if ([string]::IsNullOrWhiteSpace($remote)) { throw "republish requires the existing tag." }
            $tagSha = ($remote -split "\s+")[0]
          }
          "tag_sha=$tagSha" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Write checksums and provenance
        shell: pwsh
        run: |
          $gamever = "${{ steps.verify.outputs.gamever }}"
          uv run .release-tools/release_workflow.py write-release-metadata `
            --manifest "release-manifests/$gamever.json" --output-dir . `
            --output-merge-sha "$env:OUTPUT_MERGE_SHA" --tag-sha "${{ steps.tag.outputs.tag_sha }}" `
            --asset "gamedata-$gamever.7z" --asset "gamebin-$gamever.7z"

      - name: Publish or replace Release assets and verify hashes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $gamever = "${{ steps.verify.outputs.gamever }}"
          $mode = "${{ steps.verify.outputs.mode }}"
          $assets = @(
            "gamedata-$gamever.7z", "gamebin-$gamever.7z",
            "release-provenance-$gamever.json", "SHA256SUMS-$gamever.txt"
          )
          gh release view "$gamever" *> $null
          $exists = $LASTEXITCODE -eq 0
          if ($mode -eq "republish" -and -not $exists) { throw "republish requires Release $gamever." }
          if (-not $exists) {
            gh release create "$gamever" --draft --title "gamedata-$gamever" `
              --notes "Validated output merge $env:OUTPUT_MERGE_SHA"
            if ($LASTEXITCODE -ne 0) { throw "Failed to create draft Release." }
          }
          gh release upload "$gamever" @assets --clobber
          if ($LASTEXITCODE -ne 0) { throw "Failed to upload Release assets." }
          $verifyDir = Join-Path $env:RUNNER_TEMP "release-verify\${{ github.run_id }}-${{ github.run_attempt }}"
          New-Item -ItemType Directory -Path $verifyDir -Force | Out-Null
          foreach ($asset in $assets) {
            gh release download "$gamever" --pattern "$asset" --dir "$verifyDir" --clobber
            if ($LASTEXITCODE -ne 0) { throw "Failed to download uploaded asset $asset." }
            $localHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $asset).Hash
            $remoteHash = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $verifyDir $asset)).Hash
            if ($localHash -ne $remoteHash) { throw "Uploaded asset hash mismatch: $asset" }
          }
          gh release edit "$gamever" --notes-file "release-provenance-$gamever.json" --draft=false
          if ($LASTEXITCODE -ne 0) { throw "Failed to finalize Release publication." }

      - name: Mark promotion complete and remove recovery backup
        shell: pwsh
        run: |
          uv run .release-tools/release_workflow.py finalize-promotion `
            --staging-root "$env:PERSISTED_WORKSPACE\release-staging" `
            --pr-number "${{ github.event.pull_request.number }}" `
            --event-head-sha "${{ github.event.pull_request.head.sha }}" `
            --output-merge-sha "$env:OUTPUT_MERGE_SHA"

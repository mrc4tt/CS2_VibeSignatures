name: PR Self Runner Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: pr-self-runner-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    if: >-
      (github.repository == 'HLND2T/CS2_VibeSignatures' ||
       github.repository == 'hzqst/CS2_VibeSignatures') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !(github.event.pull_request.user.login == 'github-actions[bot]' &&
        startsWith(github.event.pull_request.head.ref, 'bump-download/') &&
        startsWith(github.event.pull_request.title, 'chore(download): Update manifest for '))
    environment: win64
    runs-on: [self-hosted, windows, x64]
    env:
      CS2VIBE_AGENT: ${{ secrets.CS2VIBE_AGENT }}
      CS2VIBE_LLM_APIKEY: ${{ secrets.CS2VIBE_LLM_APIKEY }}
      CS2VIBE_LLM_BASEURL: ${{ secrets.CS2VIBE_LLM_BASEURL }}
      CS2VIBE_LLM_EFFORT: ${{ secrets.CS2VIBE_LLM_EFFORT }}
      CS2VIBE_LLM_FAKE_AS: ${{ secrets.CS2VIBE_LLM_FAKE_AS }}
      CS2VIBE_LLM_MODEL: ${{ secrets.CS2VIBE_LLM_MODEL }}
      STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
      STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
      PERSISTED_WORKSPACE: ${{ secrets.PERSISTED_WORKSPACE }}

    steps:
      - name: Prepare PR workspace variables
        shell: pwsh
        run: |
          $prNumber = "${{ github.event.pull_request.number }}"
          if ([string]::IsNullOrWhiteSpace($prNumber)) {
            throw "Unable to determine pull request number."
          }

          if ([string]::IsNullOrWhiteSpace($env:RUNNER_WORKSPACE)) {
            throw "RUNNER_WORKSPACE is not configured."
          }

          if ([string]::IsNullOrWhiteSpace($env:PERSISTED_WORKSPACE)) {
            throw "PERSISTED_WORKSPACE secret is not configured for the win64 environment."
          }

          $workspaceRoot = [IO.Path]::GetFullPath($env:RUNNER_WORKSPACE)
          $workspaceName = "CS2_VibeSignatures-pr-$prNumber"
          $prWorkspace = [IO.Path]::GetFullPath((Join-Path $workspaceRoot $workspaceName))

          if ((Split-Path -Leaf $prWorkspace) -ne $workspaceName) {
            throw "Resolved PR workspace leaf mismatch: $prWorkspace"
          }

          $rootWithSeparator = $workspaceRoot.TrimEnd('\') + '\'
          if (-not $prWorkspace.StartsWith($rootWithSeparator, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Resolved PR workspace is outside RUNNER_WORKSPACE: $prWorkspace"
          }

          "PR_NUMBER=$prNumber" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PR_WORKSPACE=$prWorkspace" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WORKSPACE=$prWorkspace" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Checkout PR merge ref
        shell: pwsh
        run: |
          $workspaceName = "CS2_VibeSignatures-pr-$env:PR_NUMBER"
          $workspaceRoot = [IO.Path]::GetFullPath($env:RUNNER_WORKSPACE)
          $prWorkspace = [IO.Path]::GetFullPath($env:PR_WORKSPACE)
          $rootWithSeparator = $workspaceRoot.TrimEnd('\') + '\'

          if ((Split-Path -Leaf $prWorkspace) -ne $workspaceName) {
            throw "Refusing to clean unexpected workspace leaf: $prWorkspace"
          }
          if (-not $prWorkspace.StartsWith($rootWithSeparator, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Refusing to clean workspace outside RUNNER_WORKSPACE: $prWorkspace"
          }

          if (Test-Path -LiteralPath $prWorkspace) {
            Remove-Item -LiteralPath $prWorkspace -Recurse -Force
          }
          New-Item -ItemType Directory -Path $prWorkspace -Force | Out-Null

          Set-Location $prWorkspace
          $repoUrl = "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          $mergeRef = "refs/pull/$env:PR_NUMBER/merge"
          $localRef = "refs/remotes/origin/pr-$env:PR_NUMBER-merge"

          git init
          if ($LASTEXITCODE -ne 0) { throw "git init failed." }

          git remote add origin $repoUrl
          if ($LASTEXITCODE -ne 0) { throw "git remote add failed." }

          git fetch --prune origin ("+" + $mergeRef + ":" + $localRef)
          if ($LASTEXITCODE -ne 0) { throw "git fetch $mergeRef failed." }

          git checkout --detach $localRef
          if ($LASTEXITCODE -ne 0) { throw "git checkout $localRef failed." }

          git submodule update --init --recursive
          if ($LASTEXITCODE -ne 0) { throw "git submodule update failed." }

          $safeDirectory = $prWorkspace -replace '\\', '/'
          git config --global --add safe.directory "$safeDirectory"

      - name: Determine game version from PR download config
        shell: pwsh
        run: |
          Set-Location $env:WORKSPACE
          $gamever = uv run python -c "import yaml; d=yaml.safe_load(open('download.yaml', encoding='utf-8')); print(d['downloads'][-1]['tag'])"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to read latest game version from download.yaml."
          }

          $gamever = $gamever.Trim()
          if ([string]::IsNullOrWhiteSpace($gamever)) {
            throw "Latest game version from download.yaml is empty."
          }

          "GAMEVER=$gamever" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "PR validation GAMEVER=$gamever"

      - name: Prepare persisted depot link and PR bin copy
        shell: pwsh
        run: |
          function Ensure-DirectoryLink {
            param(
              [Parameter(Mandatory=$true)][string]$LinkPath,
              [Parameter(Mandatory=$true)][string]$TargetPath
            )

            if (-not (Test-Path -LiteralPath $TargetPath -PathType Container)) {
              New-Item -ItemType Directory -Path $TargetPath -Force | Out-Null
            }

            if (Test-Path -LiteralPath $LinkPath) {
              $item = Get-Item -LiteralPath $LinkPath -Force
              if (-not ($item.Attributes -band [IO.FileAttributes]::ReparsePoint)) {
                throw "$LinkPath exists but is not a directory junction or symlink."
              }
              $actualTarget = [string]$item.Target
              if ([IO.Path]::GetFullPath($actualTarget) -ne [IO.Path]::GetFullPath($TargetPath)) {
                throw "$LinkPath link target mismatch: $actualTarget"
              }
              return
            }

            cmd /c mklink /d "$LinkPath" "$TargetPath"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create directory link $LinkPath -> $TargetPath"
            }
          }

          function Get-BinCopyExcludes {
            param(
              [Parameter(Mandatory=$true)][string]$IgnoreFile
            )

            if (-not (Test-Path -LiteralPath $IgnoreFile -PathType Leaf)) {
              throw "Missing bin ignore file: $IgnoreFile"
            }

            $filePatterns = @()
            $dirPatterns = @()
            $slashChars = [char[]]@("/", "\")

            foreach ($line in Get-Content -LiteralPath $IgnoreFile) {
              $pattern = $line.Trim()
              if ([string]::IsNullOrWhiteSpace($pattern) -or $pattern.StartsWith("#") -or $pattern.StartsWith("!")) {
                continue
              }

              $isDirectoryPattern = $pattern.EndsWith("/") -or $pattern.EndsWith("\")
              $pattern = $pattern.TrimStart($slashChars)
              if ($isDirectoryPattern) {
                $pattern = $pattern.TrimEnd($slashChars)
              }

              if ($pattern.Contains("/") -or $pattern.Contains("\")) {
                throw "Unsupported nested bin ignore pattern for robocopy: $pattern"
              }

              if ($isDirectoryPattern -or $pattern -eq ".git") {
                $dirPatterns += $pattern
              } else {
                $filePatterns += $pattern
              }
            }

            [pscustomobject]@{
              Files = $filePatterns
              Dirs = $dirPatterns
            }
          }

          Set-Location $env:WORKSPACE
          $depotTarget = Join-Path $env:PERSISTED_WORKSPACE "cs2_depot"
          $persistedBinRoot = Join-Path $env:PERSISTED_WORKSPACE "bin"
          $sourceBinGamever = Join-Path $persistedBinRoot $env:GAMEVER
          $workspaceBinRoot = Join-Path $env:WORKSPACE "bin"
          $targetBinGamever = Join-Path $workspaceBinRoot $env:GAMEVER

          Ensure-DirectoryLink `
            -LinkPath (Join-Path $env:WORKSPACE "cs2_depot") `
            -TargetPath $depotTarget

          if (-not (Test-Path -LiteralPath $sourceBinGamever -PathType Container)) {
            throw "Persisted bin source for GAMEVER=$env:GAMEVER does not exist: $sourceBinGamever"
          }

          if (Test-Path -LiteralPath $workspaceBinRoot) {
            $binItem = Get-Item -LiteralPath $workspaceBinRoot -Force
            if ($binItem.Attributes -band [IO.FileAttributes]::ReparsePoint) {
              throw "Workspace bin must be a real directory for PR validation, not a link: $workspaceBinRoot"
            }
          } else {
            New-Item -ItemType Directory -Path $workspaceBinRoot -Force | Out-Null
          }

          New-Item -ItemType Directory -Path $targetBinGamever -Force | Out-Null

          $excludes = Get-BinCopyExcludes -IgnoreFile (Join-Path $persistedBinRoot ".stignore")
          $robocopyArgs = @(
            $sourceBinGamever
            $targetBinGamever
            "/E"
            "/COPY:DAT"
            "/DCOPY:DAT"
            "/R:2"
            "/W:5"
          )

          if ($excludes.Files.Count -gt 0) {
            $robocopyArgs += "/XF"
            $robocopyArgs += $excludes.Files
          }

          if ($excludes.Dirs.Count -gt 0) {
            $robocopyArgs += "/XD"
            $robocopyArgs += $excludes.Dirs
          }

          robocopy @robocopyArgs
          $robocopyExitCode = $LASTEXITCODE
          if ($robocopyExitCode -ge 8) {
            throw "Failed to copy persisted bin/$env:GAMEVER into PR workspace; robocopy exit code $robocopyExitCode"
          }

          Write-Host "Copied persisted bin/$env:GAMEVER into PR workspace; robocopy exit code $robocopyExitCode"
          $global:LASTEXITCODE = 0

      - name: Run Python unit tests
        shell: pwsh
        run: |
          Set-Location $env:WORKSPACE
          uv run python -m unittest discover -s tests -b

      - name: Analyze binaries
        shell: pwsh
        run: |
          Set-Location $env:WORKSPACE
          uv run ida_analyze_bin.py -gamever "$env:GAMEVER" -debug

      - name: Update gamedata
        shell: pwsh
        run: |
          Set-Location $env:WORKSPACE
          uv run update_gamedata.py -gamever "$env:GAMEVER" -debug -download_latest

      - name: Run C++ tests
        shell: pwsh
        run: |
          Set-Location $env:WORKSPACE
          uv run run_cpp_tests.py -gamever "$env:GAMEVER" -debug

      - name: Clean PR bin copy
        if: always()
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WORKSPACE)) {
            Write-Host "WORKSPACE is not configured; skipping PR bin cleanup."
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($env:GAMEVER)) {
            Write-Host "GAMEVER is not configured; skipping PR bin cleanup."
            exit 0
          }

          $workspaceRoot = [IO.Path]::GetFullPath($env:WORKSPACE)
          $binRoot = [IO.Path]::GetFullPath((Join-Path $workspaceRoot "bin"))
          $targetBinGamever = [IO.Path]::GetFullPath((Join-Path $binRoot $env:GAMEVER))
          $workspaceRootWithSeparator = $workspaceRoot.TrimEnd('\') + '\'
          $binRootWithSeparator = $binRoot.TrimEnd('\') + '\'

          if (-not $binRoot.StartsWith($workspaceRootWithSeparator, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Resolved bin root is outside WORKSPACE: $binRoot"
          }

          if (Test-Path -LiteralPath $binRoot) {
            $binItem = Get-Item -LiteralPath $binRoot -Force
            if ($binItem.Attributes -band [IO.FileAttributes]::ReparsePoint) {
              throw "Refusing to clean PR bin copy because workspace bin is a reparse point: $binRoot"
            }
          }

          if ((Split-Path -Leaf $targetBinGamever) -ne $env:GAMEVER) {
            throw "Resolved PR bin cleanup leaf mismatch: $targetBinGamever"
          }

          if (-not $targetBinGamever.StartsWith($binRootWithSeparator, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Resolved PR bin cleanup target is outside workspace bin root: $targetBinGamever"
          }

          if (-not (Test-Path -LiteralPath $targetBinGamever)) {
            Write-Host "PR bin cleanup target does not exist: $targetBinGamever"
            exit 0
          }

          if (-not (Test-Path -LiteralPath $targetBinGamever -PathType Container)) {
            throw "PR bin cleanup target exists but is not a directory: $targetBinGamever"
          }

          $targetItem = Get-Item -LiteralPath $targetBinGamever -Force
          if ($targetItem.Attributes -band [IO.FileAttributes]::ReparsePoint) {
            throw "Refusing to remove PR bin cleanup target because it is a reparse point: $targetBinGamever"
          }

          Remove-Item -LiteralPath $targetBinGamever -Recurse -Force
          Write-Host "Removed PR bin copy: $targetBinGamever"

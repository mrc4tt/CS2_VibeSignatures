name: PR Self Runner Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]

permissions:
  contents: read

concurrency:
  group: pr-self-runner-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    if: >-
      github.event.action != 'closed' &&
      (github.repository == 'HLND2T/CS2_VibeSignatures' ||
       github.repository == 'hzqst/CS2_VibeSignatures') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !(github.event.pull_request.user.login == 'github-actions[bot]' &&
        startsWith(github.event.pull_request.head.ref, 'bump-download/') &&
        startsWith(github.event.pull_request.title, 'chore(download): Update manifest for ')) &&
      !(github.event.pull_request.user.login == 'github-actions[bot]' &&
        startsWith(github.event.pull_request.head.ref, 'gamesymbols/') &&
        startsWith(github.event.pull_request.title, 'chore(gamesymbols): publish '))
    environment: win64
    runs-on: [self-hosted, windows, x64]
    env:
      CS2VIBE_AGENT: ${{ secrets.CS2VIBE_AGENT }}
      CS2VIBE_LLM_APIKEY: ${{ secrets.CS2VIBE_LLM_APIKEY }}
      CS2VIBE_LLM_BASEURL: ${{ secrets.CS2VIBE_LLM_BASEURL }}
      CS2VIBE_LLM_EFFORT: ${{ secrets.CS2VIBE_LLM_EFFORT }}
      CS2VIBE_LLM_FAKE_AS: ${{ secrets.CS2VIBE_LLM_FAKE_AS }}
      CS2VIBE_LLM_MODEL: ${{ secrets.CS2VIBE_LLM_MODEL }}
      STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
      STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
      PERSISTED_WORKSPACE: ${{ secrets.PERSISTED_WORKSPACE }}

    steps:
      - name: Prepare PR workspace variables
        shell: pwsh
        run: |
          $prNumber = "${{ github.event.pull_request.number }}"
          if ([string]::IsNullOrWhiteSpace($prNumber)) {
            throw "Unable to determine pull request number."
          }

          if ([string]::IsNullOrWhiteSpace($env:RUNNER_WORKSPACE)) {
            throw "RUNNER_WORKSPACE is not configured."
          }

          if ([string]::IsNullOrWhiteSpace($env:PERSISTED_WORKSPACE)) {
            throw "PERSISTED_WORKSPACE secret is not configured for the win64 environment."
          }

          $workspaceRoot = [IO.Path]::GetFullPath($env:RUNNER_WORKSPACE)
          $workspaceName = "CS2_VibeSignatures-pr-$prNumber"
          $prWorkspace = [IO.Path]::GetFullPath((Join-Path $workspaceRoot $workspaceName))

          if ((Split-Path -Leaf $prWorkspace) -ne $workspaceName) {
            throw "Resolved PR workspace leaf mismatch: $prWorkspace"
          }

          $rootWithSeparator = $workspaceRoot.TrimEnd('\') + '\'
          if (-not $prWorkspace.StartsWith($rootWithSeparator, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Resolved PR workspace is outside RUNNER_WORKSPACE: $prWorkspace"
          }

          "PR_NUMBER=$prNumber" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PR_WORKSPACE=$prWorkspace" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WORKSPACE=$prWorkspace" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Checkout PR merge ref
        shell: pwsh
        run: |
          $workspaceName = "CS2_VibeSignatures-pr-$env:PR_NUMBER"
          $workspaceRoot = [IO.Path]::GetFullPath($env:RUNNER_WORKSPACE)
          $prWorkspace = [IO.Path]::GetFullPath($env:PR_WORKSPACE)
          $rootWithSeparator = $workspaceRoot.TrimEnd('\') + '\'

          if ((Split-Path -Leaf $prWorkspace) -ne $workspaceName) {
            throw "Refusing to clean unexpected workspace leaf: $prWorkspace"
          }
          if (-not $prWorkspace.StartsWith($rootWithSeparator, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Refusing to clean workspace outside RUNNER_WORKSPACE: $prWorkspace"
          }

          if (Test-Path -LiteralPath $prWorkspace) {
            Remove-Item -LiteralPath $prWorkspace -Recurse -Force
          }
          New-Item -ItemType Directory -Path $prWorkspace -Force | Out-Null

          Set-Location $prWorkspace
          $repoUrl = "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          $mergeRef = "refs/pull/$env:PR_NUMBER/merge"
          $localRef = "refs/remotes/origin/pr-$env:PR_NUMBER-merge"

          git init
          if ($LASTEXITCODE -ne 0) { throw "git init failed." }

          git remote add origin $repoUrl
          if ($LASTEXITCODE -ne 0) { throw "git remote add failed." }

          git fetch --prune origin ("+" + $mergeRef + ":" + $localRef)
          if ($LASTEXITCODE -ne 0) { throw "git fetch $mergeRef failed." }

          git checkout --detach $localRef
          if ($LASTEXITCODE -ne 0) { throw "git checkout $localRef failed." }

          git submodule update --init --recursive
          if ($LASTEXITCODE -ne 0) { throw "git submodule update failed." }

          $safeDirectory = $prWorkspace -replace '\\', '/'
          git config --global --add safe.directory "$safeDirectory"

      - name: Check formatting
        shell: pwsh
        run: |
          Set-Location $env:WORKSPACE
          uv run python format_repo_files.py --check

      - name: Determine release version from PR download config
        shell: pwsh
        run: |
          Set-Location $env:WORKSPACE
          $gamever = uv run python -c "import yaml; d=yaml.safe_load(open('download.yaml', encoding='utf-8')); print(d['downloads'][-1]['tag'])"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to read latest game version from download.yaml."
          }

          $gamever = $gamever.Trim()
          if ([string]::IsNullOrWhiteSpace($gamever)) {
            throw "Latest game version from download.yaml is empty."
          }

          "PR_GAMEVER=$gamever" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "PR release GAMEVER=$gamever"

      - name: Extract deterministic base snapshot
        shell: pwsh
        run: |
          Set-Location $env:WORKSPACE

          $baseDir = Join-Path $env:WORKSPACE ".snapshot-base"
          if (Test-Path -LiteralPath $baseDir) {
            Remove-Item -LiteralPath $baseDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $baseDir -Force | Out-Null

          function Export-GitBlob {
            param(
              [Parameter(Mandatory=$true)][string]$Revision,
              [Parameter(Mandatory=$true)][string]$RepoPath,
              [Parameter(Mandatory=$true)][string]$OutputPath
            )

            uv run python -c `
              "import pathlib, subprocess, sys; pathlib.Path(sys.argv[3]).write_bytes(subprocess.check_output(['git', 'show', f'{sys.argv[1]}:{sys.argv[2]}']))" `
              "$Revision" "$RepoPath" "$OutputPath"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to extract $Revision`:$RepoPath"
            }
          }

          $baseRef = "${{ github.event.pull_request.base.sha }}".Trim()
          if ($baseRef -notmatch '^[0-9a-fA-F]{40}$') {
            throw "Invalid pull request base SHA: $baseRef"
          }
          git cat-file -e "$baseRef^{commit}"
          if ($LASTEXITCODE -ne 0) {
            throw "Pull request base commit is unavailable: $baseRef"
          }

           $baseConfig = Join-Path $baseDir "base-config.yaml"
          $trackedSnapshots = @(
            git ls-tree -r --name-only $baseRef -- gamesymbols |
              Where-Object { $_ -match '^gamesymbols/[^/]+\.yaml$' }
          )
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to list game-symbol snapshots from base commit $baseRef."
          }

          if ($trackedSnapshots.Count -eq 0) {
            $baseGamever = ""
            $baseSnapshot = ""
            $hasBaseSnapshot = "false"
            $validationGamever = $env:PR_GAMEVER
            Write-Host "Base commit $baseRef has no snapshot; bootstrap PR validation will rebuild $validationGamever."
          } else {
            $sameVersionSnapshot = "gamesymbols/$env:PR_GAMEVER.yaml"
            if ($trackedSnapshots -contains $sameVersionSnapshot) {
              $baseSnapshotRepoPath = $sameVersionSnapshot
            } elseif ($trackedSnapshots.Count -eq 1) {
              $baseSnapshotRepoPath = $trackedSnapshots[0]
            } else {
              $latestSnapshotChange = @(
                git log -1 --format=%H --name-only $baseRef -- gamesymbols |
                  Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
              )
              if ($LASTEXITCODE -ne 0 -or $latestSnapshotChange.Count -lt 2) {
                throw "Failed to locate the latest snapshot publication in base commit history."
              }
              $latestSnapshotPaths = @(
                $latestSnapshotChange[1..($latestSnapshotChange.Count - 1)] |
                  Where-Object { $trackedSnapshots -contains $_ }
              )
              if ($latestSnapshotPaths.Count -ne 1) {
                $snapshotList = $latestSnapshotPaths -join ", "
                throw "Latest base snapshot publication is ambiguous: $snapshotList"
              }
              $baseSnapshotRepoPath = $latestSnapshotPaths[0]
            }

            $baseGamever = [IO.Path]::GetFileNameWithoutExtension($baseSnapshotRepoPath)
            $baseSnapshotCommit = git log -1 --format=%H $baseRef -- "$baseSnapshotRepoPath"
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($baseSnapshotCommit)) {
              throw "Failed to locate the commit that published $baseSnapshotRepoPath."
            }
            $baseSnapshotCommit = $baseSnapshotCommit.Trim()
            $baseSnapshot = Join-Path $baseDir "$baseGamever.yaml"
             $versionedBaseConfig = "configs/$baseGamever.yaml"
             git cat-file -e "$baseSnapshotCommit`:$versionedBaseConfig"
             if ($LASTEXITCODE -eq 0) {
               Export-GitBlob $baseSnapshotCommit $versionedBaseConfig $baseConfig
             } else {
               Export-GitBlob $baseSnapshotCommit "config.yaml" $baseConfig
             }
            Export-GitBlob $baseRef $baseSnapshotRepoPath $baseSnapshot
            $hasBaseSnapshot = "true"
            $validationGamever = $baseGamever
          }

           $headSnapshotRepoPath = "gamesymbols/$validationGamever.yaml"
           $headSnapshot = Join-Path $baseDir "head-$validationGamever.yaml"
           Export-GitBlob "HEAD" $headSnapshotRepoPath $headSnapshot
           $headConfig = Join-Path $env:WORKSPACE "configs\$validationGamever.yaml"
           if (-not (Test-Path -LiteralPath $headConfig -PathType Leaf)) {
             throw "Missing head analysis config: $headConfig"
           }

          "BASE_REF=$baseRef" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BASE_CONFIG=$baseConfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BASE_SNAPSHOT=$baseSnapshot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BASE_GAMEVER=$baseGamever" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
           "HEAD_SNAPSHOT=$headSnapshot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
           "HEAD_CONFIG=$headConfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "HAS_BASE_SNAPSHOT=$hasBaseSnapshot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GAMEVER=$validationGamever" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "PR validation GAMEVER=$validationGamever (release GAMEVER=$env:PR_GAMEVER)"

      - name: Prepare persisted depot link and PR bin copy
        shell: pwsh
        run: |
          function Ensure-DirectoryLink {
            param(
              [Parameter(Mandatory=$true)][string]$LinkPath,
              [Parameter(Mandatory=$true)][string]$TargetPath
            )

            if (-not (Test-Path -LiteralPath $TargetPath -PathType Container)) {
              New-Item -ItemType Directory -Path $TargetPath -Force | Out-Null
            }

            if (Test-Path -LiteralPath $LinkPath) {
              $item = Get-Item -LiteralPath $LinkPath -Force
              if (-not ($item.Attributes -band [IO.FileAttributes]::ReparsePoint)) {
                throw "$LinkPath exists but is not a directory junction or symlink."
              }
              $actualTarget = [string]$item.Target
              if ([IO.Path]::GetFullPath($actualTarget) -ne [IO.Path]::GetFullPath($TargetPath)) {
                throw "$LinkPath link target mismatch: $actualTarget"
              }
              return
            }

            cmd /c mklink /d "$LinkPath" "$TargetPath"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create directory link $LinkPath -> $TargetPath"
            }
          }

          function Get-BinCopyExcludes {
            param(
              [Parameter(Mandatory=$true)][string]$IgnoreFile
            )

            if (-not (Test-Path -LiteralPath $IgnoreFile -PathType Leaf)) {
              throw "Missing bin ignore file: $IgnoreFile"
            }

            $filePatterns = @()
            $dirPatterns = @()
            $slashChars = [char[]]@("/", "\")

            foreach ($line in Get-Content -LiteralPath $IgnoreFile) {
              $pattern = $line.Trim()
              if ([string]::IsNullOrWhiteSpace($pattern) -or $pattern.StartsWith("#") -or $pattern.StartsWith("!")) {
                continue
              }

              $isDirectoryPattern = $pattern.EndsWith("/") -or $pattern.EndsWith("\")
              $pattern = $pattern.TrimStart($slashChars)
              if ($isDirectoryPattern) {
                $pattern = $pattern.TrimEnd($slashChars)
              }

              if ($pattern.Contains("/") -or $pattern.Contains("\")) {
                throw "Unsupported nested bin ignore pattern for robocopy: $pattern"
              }

              if ($isDirectoryPattern -or $pattern -eq ".git") {
                $dirPatterns += $pattern
              } else {
                $filePatterns += $pattern
              }
            }

            [pscustomobject]@{
              Files = $filePatterns
              Dirs = $dirPatterns
            }
          }

          Set-Location $env:WORKSPACE
          $depotTarget = Join-Path $env:PERSISTED_WORKSPACE "cs2_depot"
          $persistedBinRoot = Join-Path $env:PERSISTED_WORKSPACE "bin"
          $sourceBinGamever = Join-Path $persistedBinRoot $env:GAMEVER
          $workspaceBinRoot = Join-Path $env:WORKSPACE "bin"
          $targetBinGamever = Join-Path $workspaceBinRoot $env:GAMEVER

          Ensure-DirectoryLink `
            -LinkPath (Join-Path $env:WORKSPACE "cs2_depot") `
            -TargetPath $depotTarget

          if (-not (Test-Path -LiteralPath $sourceBinGamever -PathType Container)) {
            throw "Persisted bin source for GAMEVER=$env:GAMEVER does not exist: $sourceBinGamever"
          }

          if (Test-Path -LiteralPath $workspaceBinRoot) {
            $binItem = Get-Item -LiteralPath $workspaceBinRoot -Force
            if ($binItem.Attributes -band [IO.FileAttributes]::ReparsePoint) {
              throw "Workspace bin must be a real directory for PR validation, not a link: $workspaceBinRoot"
            }
          } else {
            New-Item -ItemType Directory -Path $workspaceBinRoot -Force | Out-Null
          }

          New-Item -ItemType Directory -Path $targetBinGamever -Force | Out-Null

          $excludes = Get-BinCopyExcludes -IgnoreFile (Join-Path $persistedBinRoot ".stignore")
          $robocopyArgs = @(
            $sourceBinGamever
            $targetBinGamever
            "/E"
            "/COPY:DAT"
            "/DCOPY:DAT"
            "/R:2"
            "/W:5"
          )

          if ($excludes.Files.Count -gt 0) {
            $robocopyArgs += "/XF"
            $robocopyArgs += $excludes.Files
          }

          if ($excludes.Dirs.Count -gt 0) {
            $robocopyArgs += "/XD"
            $robocopyArgs += $excludes.Dirs
          }

          robocopy @robocopyArgs
          $robocopyExitCode = $LASTEXITCODE
          if ($robocopyExitCode -ge 8) {
            throw "Failed to copy persisted bin/$env:GAMEVER into PR workspace; robocopy exit code $robocopyExitCode"
          }

          Write-Host "Copied persisted bin/$env:GAMEVER into PR workspace; robocopy exit code $robocopyExitCode"
          $global:LASTEXITCODE = 0

      - name: Restore deterministic base and invalidate affected outputs
        shell: pwsh
        run: |
          Set-Location $env:WORKSPACE
          if ($env:HAS_BASE_SNAPSHOT -eq "true") {
            uv run gamesymbol_snapshot.py restore `
              -gamever "$env:GAMEVER" `
              -bindir bin `
              -configyaml "$env:BASE_CONFIG" `
              -snapshot "$env:BASE_SNAPSHOT" `
              -replace
            if ($LASTEXITCODE -ne 0) {
              throw "Base snapshot restore failed with exit code $LASTEXITCODE"
            }
            uv run gamesymbol_pr_validation.py invalidate `
              -gamever "$env:GAMEVER" `
              -bindir bin `
              -baseconfigyaml "$env:BASE_CONFIG" `
              -basesnapshot "$env:BASE_SNAPSHOT" `
               -headconfigyaml "$env:HEAD_CONFIG" `
              -headsnapshot "$env:HEAD_SNAPSHOT" `
              -baseref "$env:BASE_REF" `
              -headref "HEAD"
            if ($LASTEXITCODE -ne 0) {
              throw "gamesymbol_pr_validation.py failed with exit code $LASTEXITCODE"
            }
          } else {
            $gameRoot = [IO.Path]::GetFullPath((Join-Path $env:WORKSPACE "bin\$env:GAMEVER"))
            $workspaceRoot = [IO.Path]::GetFullPath($env:WORKSPACE)
            $workspacePrefix = $workspaceRoot.TrimEnd('\') + '\'
            if (-not $gameRoot.StartsWith($workspacePrefix, [StringComparison]::OrdinalIgnoreCase)) {
              throw "Resolved game root is outside PR workspace: $gameRoot"
            }
            $gameRootItem = Get-Item -LiteralPath $gameRoot -Force
            if ($gameRootItem.Attributes -band [IO.FileAttributes]::ReparsePoint) {
              throw "Current game root must not be a reparse point: $gameRoot"
            }
            Get-ChildItem -LiteralPath $gameRoot -Recurse -File -Filter "*.yaml" |
              ForEach-Object { Remove-Item -LiteralPath $_.FullName -Force }
            Write-Host "Bootstrap validation: cleared persisted YAML for $env:GAMEVER."
          }

      - name: Run Python unit tests
        shell: pwsh
        run: |
          Set-Location $env:WORKSPACE
          uv run python -m unittest discover -s tests -b

      - name: Analyze binaries
        shell: pwsh
        run: |
          Set-Location $env:WORKSPACE
           uv run ida_analyze_bin.py -gamever "$env:GAMEVER" -configyaml "$env:HEAD_CONFIG" -debug
          if ($LASTEXITCODE -ne 0) {
            throw "ida_analyze_bin.py failed with exit code $LASTEXITCODE"
          }

      - name: Build actual candidate snapshot
        shell: pwsh
        run: |
          Set-Location $env:WORKSPACE
          $candidateRoot = Join-Path $env:RUNNER_TEMP "gamesymbol-candidates\pr-$env:PR_NUMBER-${{ github.run_id }}-${{ github.run_attempt }}"
          New-Item -ItemType Directory -Path $candidateRoot -Force | Out-Null
          $candidate = Join-Path $candidateRoot "$env:GAMEVER.yaml"
          $session = Join-Path $candidateRoot "$env:GAMEVER.session.json"
          "CANDIDATE_ROOT=$candidateRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ACTUAL_CANDIDATE_SNAPSHOT=$candidate" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CANDIDATE_SESSION=$session" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          uv run gamesymbol_candidate.py build `
            -gamever "$env:GAMEVER" `
            -bindir bin `
             -configyaml "$env:HEAD_CONFIG" `
            -output "$candidate" `
            -session "$session"
          if ($LASTEXITCODE -ne 0) {
            throw "candidate build failed with exit code $LASTEXITCODE"
          }

      - name: Compare actual candidate with PR head snapshot
        shell: pwsh
        run: |
          Set-Location $env:WORKSPACE
          uv run gamesymbol_candidate.py compare `
            -gamever "$env:GAMEVER" `
            -candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" `
            -expected "$env:HEAD_SNAPSHOT" `
             -configyaml "$env:HEAD_CONFIG" `
            -session "$env:CANDIDATE_SESSION"
          if ($LASTEXITCODE -ne 0) {
            throw "candidate/head comparison failed with exit code $LASTEXITCODE"
          }

      - name: Update gamedata
        shell: pwsh
        run: |
          Set-Location $env:WORKSPACE
          uv run gamesymbol_candidate.py guard -candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" -session "$env:CANDIDATE_SESSION"
          if ($LASTEXITCODE -ne 0) { throw "candidate guard failed before gamedata" }
           uv run update_gamedata.py -gamever "$env:GAMEVER" -snapshot "$env:ACTUAL_CANDIDATE_SNAPSHOT" -configyaml "$env:HEAD_CONFIG" -debug -download_latest
          if ($LASTEXITCODE -ne 0) { throw "update_gamedata.py failed with exit code $LASTEXITCODE" }
          uv run gamesymbol_candidate.py guard -candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" -session "$env:CANDIDATE_SESSION"
          if ($LASTEXITCODE -ne 0) { throw "candidate guard failed after gamedata" }
          uv run gamesymbol_candidate.py mark -candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" -session "$env:CANDIDATE_SESSION" -step gamedata
          if ($LASTEXITCODE -ne 0) { throw "failed to mark gamedata validation" }

      - name: Run C++ tests
        shell: pwsh
        run: |
          Set-Location $env:WORKSPACE
          uv run gamesymbol_candidate.py guard -candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" -session "$env:CANDIDATE_SESSION"
          if ($LASTEXITCODE -ne 0) { throw "candidate guard failed before C++ tests" }
           uv run run_cpp_tests.py -gamever "$env:GAMEVER" -snapshot "$env:ACTUAL_CANDIDATE_SNAPSHOT" -configyaml "$env:HEAD_CONFIG" -debug
          if ($LASTEXITCODE -ne 0) {
            throw "run_cpp_tests.py failed with exit code $LASTEXITCODE"
          }
          uv run gamesymbol_candidate.py guard -candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" -session "$env:CANDIDATE_SESSION"
          if ($LASTEXITCODE -ne 0) { throw "candidate guard failed after C++ tests" }
          uv run gamesymbol_candidate.py mark -candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" -session "$env:CANDIDATE_SESSION" -step cpp_tests
          if ($LASTEXITCODE -ne 0) { throw "failed to mark C++ validation" }

      - name: Mark snapshot validation success
        shell: pwsh
        run: |
          Set-Location $env:WORKSPACE
          "validated" | Out-File -LiteralPath ".snapshot-validation-success" -Encoding ascii

      - name: Clean candidate session
        if: always()
        shell: pwsh
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:CANDIDATE_ROOT) -and (Test-Path -LiteralPath $env:CANDIDATE_ROOT)) {
            Remove-Item -LiteralPath $env:CANDIDATE_ROOT -Recurse -Force
          }

  finalize-pr-workspace:
    if: >-
      github.event.action == 'closed' &&
      (github.repository == 'HLND2T/CS2_VibeSignatures' ||
       github.repository == 'hzqst/CS2_VibeSignatures') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !(github.event.pull_request.user.login == 'github-actions[bot]' &&
        startsWith(github.event.pull_request.head.ref, 'bump-download/') &&
        startsWith(github.event.pull_request.title, 'chore(download): Update manifest for ')) &&
      !(github.event.pull_request.user.login == 'github-actions[bot]' &&
        startsWith(github.event.pull_request.head.ref, 'gamesymbols/') &&
        startsWith(github.event.pull_request.title, 'chore(gamesymbols): publish '))
    environment: win64
    runs-on: [self-hosted, windows, x64]
    steps:
      - name: Finalize PR workspace
        shell: pwsh
        run: |
          $prNumber = "${{ github.event.pull_request.number }}"
          $prWasMerged = "${{ github.event.pull_request.merged }}"

          if ([string]::IsNullOrWhiteSpace($prNumber)) {
            throw "Unable to determine pull request number."
          }

          if ([string]::IsNullOrWhiteSpace($env:RUNNER_WORKSPACE)) {
            throw "RUNNER_WORKSPACE is not configured."
          }

          $workspaceRoot = [IO.Path]::GetFullPath($env:RUNNER_WORKSPACE)
          $workspaceName = "CS2_VibeSignatures-pr-$prNumber"
          $prWorkspace = [IO.Path]::GetFullPath((Join-Path $workspaceRoot $workspaceName))
          $workspaceRootWithSeparator = $workspaceRoot.TrimEnd('\') + '\'

          if ((Split-Path -Leaf $prWorkspace) -ne $workspaceName) {
            throw "Resolved PR workspace leaf mismatch: $prWorkspace"
          }

          if (-not $prWorkspace.StartsWith($workspaceRootWithSeparator, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Resolved PR workspace is outside RUNNER_WORKSPACE: $prWorkspace"
          }

          if (-not (Test-Path -LiteralPath $prWorkspace)) {
            if ($prWasMerged -eq "true") {
              throw "PR workspace does not exist for merged PR: $prWorkspace"
            }

            Write-Host "PR workspace does not exist; nothing to delete: $prWorkspace"
            exit 0
          }

          if (-not (Test-Path -LiteralPath $prWorkspace -PathType Container)) {
            throw "PR workspace exists but is not a directory: $prWorkspace"
          }

          $workspaceItem = Get-Item -LiteralPath $prWorkspace -Force
          if ($workspaceItem.Attributes -band [IO.FileAttributes]::ReparsePoint) {
            throw "Refusing to remove PR workspace because it is a reparse point: $prWorkspace"
          }

          Write-Host "PR closed (merged=$prWasMerged); candidate validation never writes persisted YAML."

          Set-Location $workspaceRoot

          Remove-Item -LiteralPath $prWorkspace -Recurse -Force
          Write-Host "Removed PR workspace: $prWorkspace"

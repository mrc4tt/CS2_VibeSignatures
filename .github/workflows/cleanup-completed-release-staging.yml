name: Cleanup Completed Release Staging

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:
    inputs:
      gamever:
        description: Optional exact GAMEVER to clean
        required: false
        type: string
      build_id:
        description: Optional exact BUILD_ID paired with GAMEVER
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: cleanup-completed-release-staging-${{ github.repository }}
  cancel-in-progress: false

jobs:
  cleanup:
    if: github.repository == 'HLND2T/CS2_VibeSignatures' || github.repository == 'hzqst/CS2_VibeSignatures'
    environment: win64
    runs-on: [self-hosted, windows, x64]
    env:
      PERSISTED_WORKSPACE: ${{ secrets.PERSISTED_WORKSPACE }}
    steps:
      - uses: actions/checkout@v4
        id: checkout
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: astral-sh/setup-uv@v6
        id: setup-uv

      - name: Clean only durable completed staging records
        id: cleanup
        shell: pwsh
        run: |
          $requestedGamever = "${{ inputs.gamever }}"
          $requestedBuildId = "${{ inputs.build_id }}"
          if ([string]::IsNullOrWhiteSpace($requestedGamever) -ne [string]::IsNullOrWhiteSpace($requestedBuildId)) {
            throw "gamever and build_id must be provided together."
          }
          if (-not [string]::IsNullOrWhiteSpace($requestedGamever)) {
            $records = @([pscustomobject]@{ gamever = $requestedGamever; build_id = $requestedBuildId })
          } else {
            $json = uv run release_workflow.py list-completed `
              --staging-root "$env:PERSISTED_WORKSPACE\release-staging"
            if ($LASTEXITCODE -ne 0) { throw "Unable to enumerate durable completion records." }
            $records = @($json | ConvertFrom-Json)
          }

          $counts = @{ removed = 0; resumed = 0; already_absent = 0; failed = 0 }
          foreach ($record in $records) {
            $resultJson = uv run release_workflow.py cleanup-completed `
              --staging-root "$env:PERSISTED_WORKSPACE\release-staging" `
              --persisted-root "$env:PERSISTED_WORKSPACE" `
              --gamever ([string]$record.gamever) `
              --build-id ([string]$record.build_id)
            if ($LASTEXITCODE -ne 0) {
              $counts.failed++
              Write-Output "::error title=Completed staging cleanup failed::GAMEVER=$($record.gamever), BUILD_ID=$($record.build_id)"
              continue
            }
            $result = $resultJson | ConvertFrom-Json
            $key = ([string]$result.status).Replace('-', '_')
            if (-not $counts.ContainsKey($key)) { throw "Unexpected cleanup status: $($result.status)" }
            $counts[$key]++
          }
          @(
            "Completed release staging cleanup"
            "- removed: $($counts.removed)"
            "- resumed: $($counts.resumed)"
            "- already absent: $($counts.already_absent)"
            "- failed: $($counts.failed)"
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          if ($counts.failed -gt 0) { throw "$($counts.failed) completed staging cleanup operation(s) failed." }

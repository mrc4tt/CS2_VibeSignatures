name: Dispatch Build After Bump Merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  dispatch-build:
    if: >
      (github.repository == 'HLND2T/CS2_VibeSignatures' || github.repository == 'hzqst/CS2_VibeSignatures') &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.base.ref == github.event.repository.default_branch &&
      startsWith(github.event.pull_request.head.ref, 'bump-download/')
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch immutable new-version build
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          SOURCE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          $headRef = $env:PR_HEAD_REF
          $gamever = $headRef.Substring("bump-download/".Length)
          $sourceSha = $env:SOURCE_SHA
          if ($gamever -notmatch '^[0-9]{4,10}[a-z]?$') { throw "Unexpected GAMEVER in branch: $headRef" }
          if ($sourceSha -notmatch '^[0-9a-fA-F]{40}$') { throw "Missing full bump merge SHA." }
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $configUri = "https://api.github.com/repos/${{ github.repository }}/contents/configs/$gamever.yaml?ref=$sourceSha"
          try {
            Invoke-RestMethod -Method Get -Uri $configUri -Headers $headers | Out-Null
          } catch {
            throw "Missing configs/$gamever.yaml at immutable bump merge SHA $sourceSha; refusing dispatch."
          }
          $payload = @{
            event_type = "build-on-self-runner"
            client_payload = @{
              gamever = $gamever
              source_sha = $sourceSha
              mode = "new"
              source_pull_request = ${{ github.event.pull_request.number }}
            }
          } | ConvertTo-Json -Depth 5
          Invoke-RestMethod -Method Post `
            -Uri "https://api.github.com/repos/${{ github.repository }}/dispatches" `
            -Headers $headers -ContentType "application/json" -Body $payload
          Write-Host "Dispatched mode=new build for $gamever from $sourceSha."

name: Validate Generated Output PR

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  validate:
    if: >
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'gamesymbols/build/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact output head
        id: checkout-output
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        id: setup-uv

      - name: Checkout trusted validation tooling from PR base
        id: checkout-tooling
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: .release-tools
          fetch-depth: 1

      - name: Verify paths, provenance, and tracked hashes
        id: verify-output
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git fetch origin "$PR_BASE_SHA" "$PR_HEAD_SHA"
          uv run .release-tools/release_workflow.py verify-output-pr \
            --repo-root "$GITHUB_WORKSPACE" \
            --repository "${{ github.repository }}" \
            --head-repository "$PR_HEAD_REPOSITORY" \
            --author "$PR_AUTHOR" --branch "$PR_HEAD_REF" \
            --base-sha "$PR_BASE_SHA" --head-sha "$PR_HEAD_SHA"

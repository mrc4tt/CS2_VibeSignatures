name: Build On Self Runner

on:
  push:
    tags:
      - "*"
  repository_dispatch:
    types: [build-on-self-runner]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    if: github.repository == 'HLND2T/CS2_VibeSignatures' || github.repository == 'hzqst/CS2_VibeSignatures'
    environment: win64
    runs-on: [self-hosted, windows, x64]
    env:
      CS2VIBE_AGENT: ${{ secrets.CS2VIBE_AGENT }}
      CS2VIBE_LLM_APIKEY: ${{ secrets.CS2VIBE_LLM_APIKEY }}
      CS2VIBE_LLM_BASEURL: ${{ secrets.CS2VIBE_LLM_BASEURL }}
      CS2VIBE_LLM_EFFORT: ${{ secrets.CS2VIBE_LLM_EFFORT }}
      CS2VIBE_LLM_FAKE_AS: ${{ secrets.CS2VIBE_LLM_FAKE_AS }}
      CS2VIBE_LLM_MODEL: ${{ secrets.CS2VIBE_LLM_MODEL }}
      STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
      STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
      PERSISTED_WORKSPACE: ${{ secrets.PERSISTED_WORKSPACE }}

    steps:
      - name: Prepare variables and validate environment configuration
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "repository_dispatch") {
            $tag = "${{ github.event.client_payload.tag }}"
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Unable to determine tag for ${{ github.event_name }} event."
          }

          if ([string]::IsNullOrWhiteSpace($env:PERSISTED_WORKSPACE)) {
            throw "PERSISTED_WORKSPACE secret is not configured for the win64 environment."
          }

          "TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GAMEVER=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WORKSPACE=${{ github.workspace }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag || github.ref }}
          fetch-depth: 0
          submodules: true

      - name: Check formatting
        shell: pwsh
        run: |
          uv run python format_repo_files.py --check

      - name: Prepare persisted depot link and real bin copy
        shell: pwsh
        run: |
          $depotTarget = [IO.Path]::GetFullPath((Join-Path $env:PERSISTED_WORKSPACE "cs2_depot"))
          $depotLink = [IO.Path]::GetFullPath((Join-Path $env:WORKSPACE "cs2_depot"))
          New-Item -ItemType Directory -Path $depotTarget -Force | Out-Null

          if (Test-Path -LiteralPath $depotLink) {
            $item = Get-Item -LiteralPath $depotLink -Force
            if (-not ($item.Attributes -band [IO.FileAttributes]::ReparsePoint)) {
              throw "cs2_depot exists but is not a directory junction or symlink."
            }
            if ([IO.Path]::GetFullPath([string]$item.Target) -ne $depotTarget) {
              throw "cs2_depot link target mismatch: $($item.Target)"
            }
          } else {
            cmd /c mklink /d "$depotLink" "$depotTarget"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create cs2_depot link."
            }
          }

          $workspaceBin = [IO.Path]::GetFullPath((Join-Path $env:WORKSPACE "bin"))
          if (Test-Path -LiteralPath $workspaceBin) {
            $binItem = Get-Item -LiteralPath $workspaceBin -Force
            if ($binItem.Attributes -band [IO.FileAttributes]::ReparsePoint) {
              throw "Workspace bin must be a real directory, not a link: $workspaceBin"
            }
          } else {
            New-Item -ItemType Directory -Path $workspaceBin -Force | Out-Null
          }

          $workspaceGamever = Join-Path $workspaceBin $env:GAMEVER
          New-Item -ItemType Directory -Path $workspaceGamever -Force | Out-Null
          $persistedGamever = Join-Path $env:PERSISTED_WORKSPACE "bin\$env:GAMEVER"
          if (Test-Path -LiteralPath $persistedGamever -PathType Container) {
            robocopy $persistedGamever $workspaceGamever /E /COPY:DAT /DCOPY:DAT /R:2 /W:5
            $robocopyExitCode = $LASTEXITCODE
            if ($robocopyExitCode -ge 8) {
              throw "Failed to copy persisted bin/$env:GAMEVER; robocopy exit code $robocopyExitCode"
            }
            Write-Host "Copied persisted bin/$env:GAMEVER into build workspace; robocopy exit code $robocopyExitCode"
            $global:LASTEXITCODE = 0
          } else {
            Write-Host "No persisted bin/$env:GAMEVER exists; starting from an empty real workspace directory."
          }

      - name: Check cached binaries
        id: check_cached_binaries
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          uv run copy_depot_bin.py -gamever "$env:GAMEVER" -platform all-platform -checkonly
          $exitCode = $LASTEXITCODE

          if ($exitCode -eq 0) {
            "bin_ready=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "All expected binaries already exist; skipping depot download."
            exit 0
          }

          if ($exitCode -eq 1) {
            "bin_ready=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "At least one expected binary is missing; depot download is required."
            exit 0
          }

          throw "copy_depot_bin.py -checkonly failed with exit code $exitCode"

      - name: Update CS2 depot
        if: steps.check_cached_binaries.outputs.bin_ready != 'true'
        shell: pwsh
        run: |
          $depotDir = Join-Path $env:GITHUB_WORKSPACE "cs2_depot"
          uv run download_depot.py -tag "$env:TAG" -depotdir "$depotDir" -config download.yaml -username "$env:STEAM_USERNAME" -password "$env:STEAM_PASSWORD" -remember-password

      - name: Copy depot binaries
        if: steps.check_cached_binaries.outputs.bin_ready != 'true'
        shell: pwsh
        run: |
          uv run copy_depot_bin.py -gamever "$env:GAMEVER" -platform all-platform

      - name: Analyze binaries
        shell: pwsh
        run: |
          $majorUpdateScript = @'
          import sys
          import yaml

          gamever = sys.argv[1]
          with open("download.yaml", encoding="utf-8") as f:
              downloads = yaml.safe_load(f).get("downloads", [])

          for item in downloads:
              if str(item.get("tag", "")).strip() == gamever:
                  print("true" if item.get("major_update") is True else "false")
                  break
          else:
              raise SystemExit(f"Failed to find game version {gamever} in download.yaml.")
          '@

          $majorUpdate = $majorUpdateScript | uv run python - "$env:GAMEVER"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to determine major update flag from download.yaml."
          }

          $majorUpdate = $majorUpdate.Trim()

          $analyzeArgs = @('-gamever', $env:GAMEVER)
          if ($majorUpdate -eq 'true') {
            Write-Host "GAMEVER=$env:GAMEVER has major_update=true in download.yaml; forcing fresh signatures."
            $analyzeArgs += @('-oldgamever', 'none')
          } else {
            Write-Host "GAMEVER=$env:GAMEVER does not have major_update=true in download.yaml; reusing old signatures."
          }

          $analyzeArgs += '-debug'
          uv run ida_analyze_bin.py @analyzeArgs
          if ($LASTEXITCODE -ne 0) {
            throw "ida_analyze_bin.py failed with exit code $LASTEXITCODE"
          }

      - name: Build candidate snapshot
        shell: pwsh
        run: |
          $candidateRoot = Join-Path $env:RUNNER_TEMP "gamesymbol-candidates\build-${{ github.run_id }}-${{ github.run_attempt }}"
          New-Item -ItemType Directory -Path $candidateRoot -Force | Out-Null
          $candidate = Join-Path $candidateRoot "$env:GAMEVER.yaml"
          $session = Join-Path $candidateRoot "$env:GAMEVER.session.json"
          "CANDIDATE_ROOT=$candidateRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ACTUAL_CANDIDATE_SNAPSHOT=$candidate" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CANDIDATE_SESSION=$session" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          uv run gamesymbol_candidate.py build `
            -gamever "$env:GAMEVER" `
            -bindir bin `
            -configyaml config.yaml `
            -output "$candidate" `
            -session "$session"
          if ($LASTEXITCODE -ne 0) {
            throw "candidate build failed with exit code $LASTEXITCODE"
          }

      - name: Update gamedata
        shell: pwsh
        run: |
          uv run gamesymbol_candidate.py guard -candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" -session "$env:CANDIDATE_SESSION"
          if ($LASTEXITCODE -ne 0) { throw "candidate guard failed before gamedata" }
          uv run update_gamedata.py -gamever "$env:GAMEVER" -snapshot "$env:ACTUAL_CANDIDATE_SNAPSHOT" -debug -download_latest
          if ($LASTEXITCODE -ne 0) { throw "update_gamedata.py failed with exit code $LASTEXITCODE" }
          uv run gamesymbol_candidate.py guard -candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" -session "$env:CANDIDATE_SESSION"
          if ($LASTEXITCODE -ne 0) { throw "candidate guard failed after gamedata" }
          uv run gamesymbol_candidate.py mark -candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" -session "$env:CANDIDATE_SESSION" -step gamedata
          if ($LASTEXITCODE -ne 0) { throw "failed to mark gamedata validation" }

      - name: Run C++ tests
        shell: pwsh
        run: |
          uv run gamesymbol_candidate.py guard -candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" -session "$env:CANDIDATE_SESSION"
          if ($LASTEXITCODE -ne 0) { throw "candidate guard failed before C++ tests" }
          $args = @('-gamever', $env:GAMEVER, '-snapshot', $env:ACTUAL_CANDIDATE_SNAPSHOT, '-debug')
          uv run run_cpp_tests.py @args
          if ($LASTEXITCODE -ne 0) {
            throw "run_cpp_tests.py failed with exit code $LASTEXITCODE"
          }
          uv run gamesymbol_candidate.py guard -candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" -session "$env:CANDIDATE_SESSION"
          if ($LASTEXITCODE -ne 0) { throw "candidate guard failed after C++ tests" }
          uv run gamesymbol_candidate.py mark -candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" -session "$env:CANDIDATE_SESSION" -step cpp_tests
          if ($LASTEXITCODE -ne 0) { throw "failed to mark C++ validation" }

      - name: Publish validated candidate snapshot
        shell: pwsh
        run: |
          uv run gamesymbol_candidate.py publish `
            -candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" `
            -session "$env:CANDIDATE_SESSION" `
            -snapshot "gamesymbols/$env:GAMEVER.yaml"
          if ($LASTEXITCODE -ne 0) {
            throw "candidate publication failed with exit code $LASTEXITCODE"
          }

      - name: Persist validated bin cache
        shell: pwsh
        run: |
          $source = [IO.Path]::GetFullPath((Join-Path $env:WORKSPACE "bin\$env:GAMEVER"))
          $workspaceRoot = [IO.Path]::GetFullPath($env:WORKSPACE)
          if (-not $source.StartsWith($workspaceRoot.TrimEnd('\') + '\', [StringComparison]::OrdinalIgnoreCase)) {
            throw "Validated bin source is outside the build workspace: $source"
          }
          $sourceItem = Get-Item -LiteralPath $source -Force
          if ($sourceItem.Attributes -band [IO.FileAttributes]::ReparsePoint) {
            throw "Validated bin source must not be a reparse point: $source"
          }

          $persistedRoot = [IO.Path]::GetFullPath($env:PERSISTED_WORKSPACE)
          $target = [IO.Path]::GetFullPath((Join-Path $persistedRoot "bin\$env:GAMEVER"))
          if (-not $target.StartsWith($persistedRoot.TrimEnd('\') + '\', [StringComparison]::OrdinalIgnoreCase)) {
            throw "Persisted bin target is outside PERSISTED_WORKSPACE: $target"
          }
          New-Item -ItemType Directory -Path $target -Force | Out-Null
          Get-ChildItem -LiteralPath $target -Recurse -File -Filter "*.yaml" -ErrorAction SilentlyContinue |
            ForEach-Object { Remove-Item -LiteralPath $_.FullName -Force }

          robocopy $source $target /E /COPY:DAT /DCOPY:DAT /R:2 /W:5
          $robocopyExitCode = $LASTEXITCODE
          if ($robocopyExitCode -ge 8) {
            throw "Failed to persist validated bin/$env:GAMEVER; robocopy exit code $robocopyExitCode"
          }
          Write-Host "Persisted validated bin/$env:GAMEVER; robocopy exit code $robocopyExitCode"
          $global:LASTEXITCODE = 0

      - name: Create follow-up game-symbol snapshot PR
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $snapshot = "gamesymbols/$env:GAMEVER.yaml"
          git add -- "$snapshot"
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Tracked snapshot already matches the validated result; no follow-up PR is needed."
            exit 0
          }

          $branch = "gamesymbols/$env:GAMEVER"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          if ($LASTEXITCODE -ne 0) { throw "Failed to create snapshot branch $branch" }
          git add -- "$snapshot"
          git commit -m "chore(gamesymbols): add $env:GAMEVER snapshot" `
            -m "Co-Authored-By: Codex (GPT-5.x)"
          if ($LASTEXITCODE -ne 0) { throw "Failed to commit $snapshot" }
          git push --force-with-lease origin "$branch"
          if ($LASTEXITCODE -ne 0) { throw "Failed to push snapshot branch $branch" }

          $existingPr = gh pr list --head "$branch" --state open --json number --jq '.[0].number'
          if ([string]::IsNullOrWhiteSpace($existingPr)) {
            gh pr create `
              --base "${{ github.event.repository.default_branch }}" `
              --head "$branch" `
              --title "chore(gamesymbols): add $env:GAMEVER snapshot" `
              --body "Adds the canonical game-symbol snapshot produced after full analysis, gamedata, and C++ validation."
            if ($LASTEXITCODE -ne 0) { throw "Failed to create follow-up snapshot PR" }
          } else {
            Write-Host "Snapshot PR #$existingPr is already open."
          }

      - name: Archive release payload
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $gamedataArchiveArgs = @(
            "a"
            "gamedata-$($env:GAMEVER).7z"
            "bin\$($env:GAMEVER)"
            "gamesymbols/$env:GAMEVER.yaml"
            "dist"
            "hl2sdk_cs2"
            "-r"
            "-x!*.dll"
            "-x!*.so"
            "-x!*.i64"
            "-x!*.id0"
            "-x!*.id1"
            "-x!*.id2"
            "-x!*.nam"
            "-x!*.til"
            "-x!.git"
            "-x!.git-blame-ignore-revs"
            "-x!.gitmodules"
            "-xr!__pycache__"
            "-xr!gamedata.py"
            "-xr!config.yaml"
          )
          & 7z @gamedataArchiveArgs
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to create gamedata-$($env:GAMEVER).7z; 7z exit code $LASTEXITCODE"
          }

          $gamebinArchiveArgs = @(
            "a"
            "gamebin-$($env:GAMEVER).7z"
            "bin\$($env:GAMEVER)"
            "-r"
            "-i!*.dll"
            "-i!*.so"
            "-x!*.yaml"
          )
          & 7z @gamebinArchiveArgs
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to create gamebin-$($env:GAMEVER).7z; 7z exit code $LASTEXITCODE"
          }

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'repository_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag || github.ref_name }}
          name: gamedata-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag || github.ref_name }}
          files: |
            gamedata-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag || github.ref_name }}.7z
            gamebin-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag || github.ref_name }}.7z

      - name: Clean temporary IDA database files
        if: always()
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PERSISTED_WORKSPACE)) {
            Write-Host "PERSISTED_WORKSPACE is not configured; skipping temporary IDA database cleanup."
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($env:GAMEVER)) {
            Write-Host "GAMEVER is not configured; skipping temporary IDA database cleanup."
            exit 0
          }

          $targetDirs = @(
            (Join-Path $env:PERSISTED_WORKSPACE "bin\$($env:GAMEVER)")
            (Join-Path $env:PERSISTED_WORKSPACE "bin\gamever\$($env:GAMEVER)")
          )
          $extensions = @("*.id0", "*.id1", "*.id2", "*.nam", "*.til")

          foreach ($targetDir in $targetDirs) {
            if (-not (Test-Path -LiteralPath $targetDir -PathType Container)) {
              Write-Host "Temporary IDA database cleanup target does not exist: $targetDir"
              continue
            }

            foreach ($extension in $extensions) {
              Get-ChildItem -LiteralPath $targetDir -Directory |
                ForEach-Object {
                  Get-ChildItem -LiteralPath $_.FullName -Filter $extension -File -Force -ErrorAction SilentlyContinue |
                    ForEach-Object { Remove-Item -LiteralPath $_.FullName -Force }
                }
            }
          }

      - name: Clean candidate session
        if: always()
        shell: pwsh
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:CANDIDATE_ROOT) -and (Test-Path -LiteralPath $env:CANDIDATE_ROOT)) {
            Remove-Item -LiteralPath $env:CANDIDATE_ROOT -Recurse -Force
          }

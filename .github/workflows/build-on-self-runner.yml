name: Build On Self Runner
run-name: Release build ${{ inputs.gamever || github.event.client_payload.gamever }}

on:
  workflow_dispatch:
    inputs:
      gamever:
        description: Game version from download.yaml
        required: true
        type: string
      source_sha:
        description: Full immutable commit SHA reachable from the default branch
        required: true
        type: string
      mode:
        description: Release lifecycle mode
        required: true
        type: choice
        options: [new, republish]
      allow_legacy_bootstrap:
        description: Explicitly allow trusted tracked-snapshot bootstrap without an accepted manifest
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [build-on-self-runner]

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: release-build-${{ github.repository }}-${{ inputs.gamever || github.event.client_payload.gamever }}
  cancel-in-progress: false

jobs:
  preflight:
    if: github.repository == 'HLND2T/CS2_VibeSignatures' || github.repository == 'hzqst/CS2_VibeSignatures'
    runs-on: ubuntu-latest
    outputs:
      gamever: ${{ steps.resolve.outputs.gamever }}
      source_sha: ${{ steps.resolve.outputs.source_sha }}
      mode: ${{ steps.resolve.outputs.mode }}
      allow_legacy_bootstrap: ${{ steps.resolve.outputs.allow_legacy_bootstrap }}
    steps:
      - name: Checkout default branch for trust validation
        id: checkout-trust
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        id: setup-uv

      - name: Resolve and validate dispatch contract
        id: resolve
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $gamever = "${{ inputs.gamever || github.event.client_payload.gamever }}"
          $sourceSha = "${{ inputs.source_sha || github.event.client_payload.source_sha }}"
          $mode = "${{ inputs.mode || github.event.client_payload.mode }}"
          $allowLegacyBootstrap = "${{ inputs.allow_legacy_bootstrap || github.event.client_payload.allow_legacy_bootstrap || 'false' }}".ToLowerInvariant()
          if ($allowLegacyBootstrap -notin @("true", "false")) {
            throw "allow_legacy_bootstrap must be true or false."
          }
          if ($allowLegacyBootstrap -eq "true" -and "${{ github.event_name }}" -ne "workflow_dispatch") {
            throw "Legacy bootstrap is only allowed for workflow_dispatch."
          }
          if ($allowLegacyBootstrap -eq "true" -and $mode -ne "republish") {
            throw "Legacy bootstrap is only allowed for republish mode."
          }
          git fetch origin --tags --force "+refs/heads/*:refs/remotes/origin/*"
          uv run release_workflow.py validate-build `
            --repository "${{ github.repository }}" `
            --gamever "$gamever" `
            --source-sha "$sourceSha" `
            --mode "$mode" `
            --default-ref "origin/${{ github.event.repository.default_branch }}"

          if ($mode -eq "republish") {
            gh release view "$gamever" --repo "${{ github.repository }}" > $null
            if ($LASTEXITCODE -ne 0) { throw "mode=republish requires Release $gamever to exist." }
          } else {
            gh release view "$gamever" --repo "${{ github.repository }}" *> $null
            if ($LASTEXITCODE -eq 0) { throw "mode=new requires Release $gamever to be absent." }
          }

          $canonicalPrefix = "gamesymbols/build/$gamever/"
          $legacyPrefix = "gamesymbols/$gamever/build-"
          $openJson = gh pr list --state open --limit 100 --json headRefName,url
          if ($LASTEXITCODE -ne 0) { throw "Failed to query open generated-output PRs." }
          $open = $openJson | ConvertFrom-Json
          $duplicate = $open | Where-Object { $_.headRefName.StartsWith($canonicalPrefix) } | Select-Object -First 1
          if ($duplicate) { throw "An output PR already exists for $gamever`: $($duplicate.url)" }
          $legacy = $open | Where-Object { $_.headRefName.StartsWith($legacyPrefix) } | Select-Object -First 1
          if ($legacy) {
            throw "A legacy-format output PR must be resolved before dispatch for $gamever`: $($legacy.url)"
          }
          "gamever=$gamever" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "source_sha=$sourceSha" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "mode=$mode" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "allow_legacy_bootstrap=$allowLegacyBootstrap" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

  build:
    needs: preflight
    environment: win64
    runs-on: [self-hosted, windows, x64]
    env:
      GAMEVER: ${{ needs.preflight.outputs.gamever }}
      SOURCE_SHA: ${{ needs.preflight.outputs.source_sha }}
      MODE: ${{ needs.preflight.outputs.mode }}
      ALLOW_LEGACY_BOOTSTRAP: ${{ needs.preflight.outputs.allow_legacy_bootstrap }}
      BUILD_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      CS2VIBE_AGENT: ${{ secrets.CS2VIBE_AGENT }}
      CS2VIBE_AGENT_MODEL: ${{ secrets.CS2VIBE_AGENT_MODEL }}
      CS2VIBE_LLM_APIKEY: ${{ secrets.CS2VIBE_LLM_APIKEY }}
      CS2VIBE_LLM_BASEURL: ${{ secrets.CS2VIBE_LLM_BASEURL }}
      CS2VIBE_LLM_EFFORT: ${{ secrets.CS2VIBE_LLM_EFFORT }}
      CS2VIBE_LLM_FAKE_AS: ${{ secrets.CS2VIBE_LLM_FAKE_AS }}
      CS2VIBE_LLM_MODEL: ${{ secrets.CS2VIBE_LLM_MODEL }}
      STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
      STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
      PERSISTED_WORKSPACE: ${{ secrets.PERSISTED_WORKSPACE }}
    steps:
      - name: Checkout exact generator source
        id: checkout-source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.source_sha }}
          fetch-depth: 0
          submodules: true

      - name: Prepare persisted depot link and real bin copy
        id: prepare-workspace
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PERSISTED_WORKSPACE)) { throw "PERSISTED_WORKSPACE is not configured." }
          $workspace = [IO.Path]::GetFullPath("${{ github.workspace }}")
          $depotTarget = [IO.Path]::GetFullPath((Join-Path $env:PERSISTED_WORKSPACE "cs2_depot"))
          $depotLink = Join-Path $workspace "cs2_depot"
          New-Item -ItemType Directory -Path $depotTarget -Force | Out-Null
          if (Test-Path -LiteralPath $depotLink) {
            $item = Get-Item -LiteralPath $depotLink -Force
            if (-not ($item.Attributes -band [IO.FileAttributes]::ReparsePoint)) { throw "cs2_depot must be a link." }
          } else {
            cmd /c mklink /d "$depotLink" "$depotTarget"
            if ($LASTEXITCODE -ne 0) { throw "Failed to create cs2_depot link." }
          }
          $workspaceBin = Join-Path $workspace "bin"
          New-Item -ItemType Directory -Path $workspaceBin -Force | Out-Null
          if ((Get-Item $workspaceBin -Force).Attributes -band [IO.FileAttributes]::ReparsePoint) {
            throw "Workspace bin must be a real directory"
          }
          $workspaceGamever = Join-Path $workspaceBin $env:GAMEVER
          New-Item -ItemType Directory -Path $workspaceGamever -Force | Out-Null
          $persistedGamever = Join-Path $env:PERSISTED_WORKSPACE "bin\$env:GAMEVER"
          if (Test-Path -LiteralPath $persistedGamever -PathType Container) {
            robocopy $persistedGamever $workspaceGamever /E /COPY:DAT /DCOPY:DAT /R:2 /W:5
            if ($LASTEXITCODE -ge 8) { throw "Failed to copy persisted bin/$env:GAMEVER." }
            $global:LASTEXITCODE = 0
            Write-Host "Copied persisted bin/$env:GAMEVER into build workspace"
          }
          "OUTPUT_BRANCH=gamesymbols/build/$env:GAMEVER/$env:BUILD_ID" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          uv run release_workflow.py check-pending `
            --staging-root "$env:PERSISTED_WORKSPACE\release-staging" `
            --gamever "$env:GAMEVER" --build-id "$env:BUILD_ID"

      - name: Resolve immutable analysis config
        id: resolve-config
        shell: pwsh
        run: |
          $config = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE "configs\$env:GAMEVER.yaml"))
          if (-not (Test-Path -LiteralPath $config -PathType Leaf)) {
            throw "Missing analysis config for GAMEVER $env:GAMEVER`: $config"
          }
          $hash = (Get-FileHash -LiteralPath $config -Algorithm SHA256).Hash.ToLowerInvariant()
          "ANALYSIS_CONFIG=$config" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "ANALYSIS_CONFIG_SHA256=$hash" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Analysis config: $config"
          Write-Host "Analysis config SHA-256: $hash"

      - name: Check formatting and run repository test suites
        id: test-suites
        shell: pwsh
        run: |
          uv run python format_repo_files.py --check
          if ($LASTEXITCODE -ne 0) { throw "Repository formatting check failed." }
          foreach ($suite in @('unit', 'repository-contract', 'redis-integration', 'release-integration', 'all')) {
            uv run python tests/run_test_suite.py $suite -b --durations 30
            if ($LASTEXITCODE -ne 0) { throw "Repository test suite failed: $suite" }
          }

      - name: Restore accepted same-version state and invalidate affected outputs
        id: restore-state
        if: env.MODE == 'republish'
        shell: pwsh
        run: |
          $args = @(
            'invalidate-republish',
            '--gamever', $env:GAMEVER,
            '--source-sha', $env:SOURCE_SHA,
            '--bindir', 'bin'
          )
          if ($env:ALLOW_LEGACY_BOOTSTRAP -eq "true") {
            $args += '--allow-legacy-bootstrap'
          }
          uv run release_workflow.py @args

      - name: Prepare trusted old-version signature baseline
        id: oldgamever
        shell: pwsh
        run: |
          uv run release_workflow.py prepare-oldgamever `
            --gamever "$env:GAMEVER" --bindir bin --github-output "$env:GITHUB_OUTPUT"
          if ($LASTEXITCODE -ne 0) { throw "Failed to prepare old-version signature baseline." }

      - name: Check cached binaries
        id: cache
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          uv run copy_depot_bin.py -gamever "$env:GAMEVER" -platform all-platform -config "$env:ANALYSIS_CONFIG" -checkonly
          $code = $LASTEXITCODE
          if ($code -eq 0) { "ready=true" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append; exit 0 }
          if ($code -eq 1) { "ready=false" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append; exit 0 }
          throw "copy_depot_bin.py -checkonly failed with exit code $code"

      - name: Download and copy missing depot binaries
        id: download-binaries
        if: steps.cache.outputs.ready != 'true'
        shell: pwsh
        run: |
          uv run download_depot.py -tag "$env:GAMEVER" -depotdir cs2_depot -config download.yaml -configyaml "$env:ANALYSIS_CONFIG" `
            -username "$env:STEAM_USERNAME" -password "$env:STEAM_PASSWORD" -remember-password
          if ($LASTEXITCODE -ne 0) { throw "download_depot.py failed with exit code $LASTEXITCODE" }
          uv run copy_depot_bin.py -gamever "$env:GAMEVER" -platform all-platform -config "$env:ANALYSIS_CONFIG"
          if ($LASTEXITCODE -ne 0) { throw "copy_depot_bin.py failed with exit code $LASTEXITCODE" }

      - name: Analyze binaries with normal producer scheduling
        id: analyze
        shell: pwsh
        env:
          OLDGAMEVER: ${{ steps.oldgamever.outputs.oldgamever }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:OLDGAMEVER)) {
            throw "Old-version signature policy was not resolved."
          }
          $args = @('-gamever', $env:GAMEVER, '-configyaml', $env:ANALYSIS_CONFIG)
          $args += @('-oldgamever', $env:OLDGAMEVER)
          $args += '-debug'
          uv run ida_analyze_bin.py @args
          if ($LASTEXITCODE -ne 0) { throw "ida_analyze_bin.py failed with exit code $LASTEXITCODE" }

      - name: Build immutable symbol and gamedata candidates
        id: build-candidates
        shell: pwsh
        run: |
          $root = Join-Path $env:RUNNER_TEMP "release-candidates\$env:BUILD_ID"
          New-Item -ItemType Directory -Path $root -Force | Out-Null
          $candidate = Join-Path $root "$env:GAMEVER.yaml"
          $session = Join-Path $root "$env:GAMEVER.session.json"
          $gamedataRoot = Join-Path $root "gamedata-candidate"
          $gamedataSession = Join-Path $root "$env:GAMEVER.gamedata.session.json"
          "CANDIDATE_ROOT=$root" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "ACTUAL_CANDIDATE_SNAPSHOT=$candidate" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "CANDIDATE_SESSION=$session" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "GAMEDATA_CANDIDATE_ROOT=$gamedataRoot" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "GAMEDATA_SESSION=$gamedataSession" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          uv run gamesymbol_candidate.py build -gamever "$env:GAMEVER" -bindir bin -configyaml "$env:ANALYSIS_CONFIG" `
            -output "$candidate" -session "$session"
          if ($LASTEXITCODE -ne 0) { throw "candidate build failed with exit code $LASTEXITCODE" }
          uv run gamesymbol_candidate.py guard -candidate "$candidate" -session "$session"
          if ($LASTEXITCODE -ne 0) { throw "candidate guard failed before gamedata" }
          uv run gamedata_candidate.py build -gamever "$env:GAMEVER" -build-id "$env:BUILD_ID" `
            -snapshot "$candidate" -configyaml "$env:ANALYSIS_CONFIG" `
            -candidate-root "$gamedataRoot" -session "$gamedataSession" -debug
          if ($LASTEXITCODE -ne 0) { throw "gamedata candidate build failed with exit code $LASTEXITCODE" }
          uv run gamedata_candidate.py guard -session "$gamedataSession"
          if ($LASTEXITCODE -ne 0) { throw "gamedata candidate guard failed" }
          uv run gamesymbol_candidate.py guard -candidate "$candidate" -session "$session"
          if ($LASTEXITCODE -ne 0) { throw "candidate guard failed after gamedata" }
          uv run gamesymbol_candidate.py mark -candidate "$candidate" -session "$session" -step gamedata
          if ($LASTEXITCODE -ne 0) { throw "failed to mark gamedata validation" }

      - name: Select versioned SDK for C++ ABI validation
        id: select-sdk
        shell: pwsh
        run: |
          $sdkPath = Join-Path $env:GITHUB_WORKSPACE "hl2sdk_cs2"
          $safeSdkPath = ([IO.Path]::GetFullPath($sdkPath) -replace '\\', '/')
          git config --global --add safe.directory "$safeSdkPath"
          if ($LASTEXITCODE -ne 0) { throw "Failed to trust hl2sdk_cs2 Git directory." }
          $sdkRef = "cs2-$env:GAMEVER"
          $sdkRemote = "https://github.com/HLND2T/hl2sdk.git"
          $pinnedSha = (git -C $sdkPath rev-parse HEAD).Trim()
          if ($LASTEXITCODE -ne 0 -or $pinnedSha -notmatch '^[0-9a-fA-F]{40}$') {
            throw "Unable to resolve the pinned hl2sdk_cs2 commit."
          }
          "SDK_PINNED_SHA=$pinnedSha" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

          $remoteBranch = git -C $sdkPath ls-remote --heads $sdkRemote "refs/heads/$sdkRef"
          if ($LASTEXITCODE -ne 0) { throw "Unable to query $sdkRef from hl2sdk." }

          if ([string]::IsNullOrWhiteSpace($remoteBranch)) {
            "SDK_ABI_REF=pinned-submodule" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
            "SDK_ABI_SHA=$pinnedSha" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
            "SDK_ABI_SWITCHED=false" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "No versioned SDK branch exists for $sdkRef; retaining the pinned submodule revision."
            Write-Host "C++ ABI SDK selection: GAMEVER=$env:GAMEVER; ref=pinned-submodule; selected SHA=$pinnedSha; pinned SHA=$pinnedSha"
          } else {
            $remoteSha = ($remoteBranch -split '\s+')[0]
            if ($remoteSha -notmatch '^[0-9a-fA-F]{40}$') { throw "Invalid commit returned for $sdkRef." }
            git -C $sdkPath fetch --no-tags $sdkRemote "refs/heads/$sdkRef"
            if ($LASTEXITCODE -ne 0) { throw "Unable to fetch $sdkRef from hl2sdk." }
            $fetchedSha = (git -C $sdkPath rev-parse FETCH_HEAD).Trim()
            if ($LASTEXITCODE -ne 0 -or $fetchedSha -ne $remoteSha) {
              throw "Fetched commit for $sdkRef does not match the queried remote commit."
            }
            "SDK_ABI_SWITCHED=true" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
            git -C $sdkPath checkout --detach $remoteSha
            if ($LASTEXITCODE -ne 0) { throw "Unable to checkout $sdkRef." }
            $selectedSha = (git -C $sdkPath rev-parse HEAD).Trim()
            if ($LASTEXITCODE -ne 0 -or $selectedSha -ne $remoteSha) {
              throw "Selected SDK commit does not match $sdkRef."
            }
            "SDK_ABI_REF=$sdkRef" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
            "SDK_ABI_SHA=$selectedSha" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "C++ ABI SDK selection: GAMEVER=$env:GAMEVER; ref=$sdkRef; selected SHA=$selectedSha; pinned SHA=$pinnedSha"
          }

      - name: Run C++ tests
        id: cpp-tests
        shell: pwsh
        run: |
          uv run gamesymbol_candidate.py guard -candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" -session "$env:CANDIDATE_SESSION"
          if ($LASTEXITCODE -ne 0) { throw "candidate guard failed before C++ tests" }
          uv run run_cpp_tests.py -gamever "$env:GAMEVER" -snapshot "$env:ACTUAL_CANDIDATE_SNAPSHOT" -configyaml "$env:ANALYSIS_CONFIG" -debug
          if ($LASTEXITCODE -ne 0) { throw "run_cpp_tests.py failed with exit code $LASTEXITCODE" }
          uv run gamesymbol_candidate.py guard -candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" -session "$env:CANDIDATE_SESSION"
          if ($LASTEXITCODE -ne 0) { throw "candidate guard failed after C++ tests" }
          uv run gamesymbol_candidate.py mark -candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" -session "$env:CANDIDATE_SESSION" -step cpp_tests
          if ($LASTEXITCODE -ne 0) { throw "failed to mark C++ validation" }

      - name: Restore pinned SDK revision
        id: restore-sdk
        if: always()
        shell: pwsh
        run: |
          if ($env:SDK_ABI_SWITCHED -ne "true") {
            Write-Host "C++ ABI SDK restore: pinned submodule revision remained selected."
            exit 0
          }
          if ($env:SDK_PINNED_SHA -notmatch '^[0-9a-fA-F]{40}$') {
            throw "SDK_PINNED_SHA is unavailable or invalid."
          }
          $sdkPath = Join-Path $env:GITHUB_WORKSPACE "hl2sdk_cs2"
          git -C $sdkPath checkout --detach "$env:SDK_PINNED_SHA"
          if ($LASTEXITCODE -ne 0) { throw "Unable to restore pinned hl2sdk_cs2 commit." }
          $restoredSha = (git -C $sdkPath rev-parse HEAD).Trim()
          if ($LASTEXITCODE -ne 0 -or $restoredSha -ne $env:SDK_PINNED_SHA) {
            throw "Restored SDK commit does not match SDK_PINNED_SHA."
          }
          Write-Host "C++ ABI SDK restore: restored pinned SHA=$restoredSha"

      - name: Publish fully validated immutable candidate
        id: publish-candidate
        shell: pwsh
        run: |
          uv run gamesymbol_candidate.py publish -candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" -session "$env:CANDIDATE_SESSION" `
            -snapshot "gamesymbols/$env:GAMEVER.yaml"
          if ($LASTEXITCODE -ne 0) { throw "candidate publication failed with exit code $LASTEXITCODE" }
          uv run gamedata_candidate.py guard -session "$env:GAMEDATA_SESSION"
          if ($LASTEXITCODE -ne 0) { throw "gamedata candidate guard failed before publication" }
          uv run gamedata_candidate.py publish -session "$env:GAMEDATA_SESSION" -outputdir "gamedata/$env:GAMEVER"
          if ($LASTEXITCODE -ne 0) { throw "gamedata publication failed with exit code $LASTEXITCODE" }

          $allowedSnapshot = "gamesymbols/$env:GAMEVER.yaml"
          $allowedGamedataPrefix = "gamedata/$env:GAMEVER/"
          $changedPaths = git status --porcelain=v1 --untracked-files=all | ForEach-Object {
            if ($_.Length -lt 4) { throw "Unexpected git status entry: $_" }
            $_.Substring(3).Replace('\', '/')
          }
          $rejected = @($changedPaths | Where-Object {
            $_ -ne $allowedSnapshot -and -not $_.StartsWith($allowedGamedataPrefix, [StringComparison]::Ordinal)
          })
          if ($rejected.Count -gt 0) {
            throw "Candidate publication changed paths outside the exact release outputs: $($rejected -join ', ')"
          }

      - name: Stage validated pending state and tracked manifest
        id: stage-pending
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$env:OUTPUT_BRANCH"
          if ($LASTEXITCODE -ne 0) { throw "Failed to create immutable output branch." }
          git add -- "gamesymbols/$env:GAMEVER.yaml" "gamedata/$env:GAMEVER"
          if ($LASTEXITCODE -ne 0) { throw "Failed to stage generated release output." }
          uv run release_workflow.py stage-build `
            --staging-root "$env:PERSISTED_WORKSPACE\release-staging" `
            --bin-source "bin\$env:GAMEVER" --candidate "$env:ACTUAL_CANDIDATE_SNAPSHOT" `
            --repository "${{ github.repository }}" --output-branch "$env:OUTPUT_BRANCH" `
            --gamever "$env:GAMEVER" --mode "$env:MODE" --build-id "$env:BUILD_ID" `
            --source-sha "$env:SOURCE_SHA" `
            --analysis-config "$env:ANALYSIS_CONFIG" `
            --gamedata-session "$env:GAMEDATA_SESSION" `
            --workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Create immutable generated-output branch and PR
        id: create-output-pr
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          git add -- "release-manifests/$env:GAMEVER.json"
          if ($LASTEXITCODE -ne 0) { throw "Failed to stage tracked release manifest." }
          git commit -m "chore(gamesymbols): publish $env:GAMEVER build $env:BUILD_ID" `
            -m "Co-Authored-By: Codex (GPT-5.x)"
          if ($LASTEXITCODE -ne 0) { throw "Failed to commit generated release output." }
          $headSha = (git rev-parse HEAD).Trim()
          uv run release_workflow.py finalize-stage `
            --staging-root "$env:PERSISTED_WORKSPACE\release-staging" --gamever "$env:GAMEVER" `
            --build-id "$env:BUILD_ID" --pr-head-sha "$headSha"
          if ($LASTEXITCODE -ne 0) { throw "Failed to bind staged state to output commit." }
          git push origin "HEAD:refs/heads/$env:OUTPUT_BRANCH"
          if ($LASTEXITCODE -ne 0) { throw "Failed to push immutable output branch." }
          $prUrl = gh pr create --base "${{ github.event.repository.default_branch }}" --head "$env:OUTPUT_BRANCH" `
            --title "chore(gamesymbols): publish $env:GAMEVER build $env:BUILD_ID" `
            --body "Validated release output from immutable source $env:SOURCE_SHA. Merge is the promotion gate."
          if ($LASTEXITCODE -ne 0) { throw "Failed to create generated-output PR." }
          $prNumber = gh pr view $prUrl --json number --jq .number
          if ($LASTEXITCODE -ne 0) { throw "Failed to resolve generated-output PR number." }
          uv run release_workflow.py write-pr-index `
            --staging-root "$env:PERSISTED_WORKSPACE\release-staging" --pr-number $prNumber `
            --gamever "$env:GAMEVER" --build-id "$env:BUILD_ID" --pr-head-sha "$headSha"
          Write-Host "Generated-output PR: $prUrl"

      - name: Clean incomplete staging and candidate session
        id: cleanup
        if: always()
        shell: pwsh
        run: |
          if ($env:PERSISTED_WORKSPACE -and $env:GAMEVER -and $env:BUILD_ID) {
            uv run release_workflow.py cleanup-incomplete `
              --staging-root "$env:PERSISTED_WORKSPACE\release-staging" `
              --gamever "$env:GAMEVER" --build-id "$env:BUILD_ID"
          }
          if ($env:CANDIDATE_ROOT -and (Test-Path -LiteralPath $env:CANDIDATE_ROOT)) {
            Remove-Item -LiteralPath $env:CANDIDATE_ROOT -Recurse -Force
          }
